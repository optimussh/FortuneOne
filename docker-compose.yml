version: '3.8'

services:
  frontend:
    build: ./frontend
    ports:
      - "6100:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      # SQLite file inside container volume
      - DATABASE_URL=sqlite+aiosqlite:///./data/fortuneone.db
      - SECRET_KEY=your-super-secret-key-2026
      - FRONTEND_URL=http://localhost:6100
    volumes:
      - backend_data:/app/data

volumes:
  backend_data:
