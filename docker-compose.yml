version: '3.8'

services:
  frontend:
    build: ./frontend
    ports:
      - "6000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://user:password@db:5432/saasdb
      - SECRET_KEY=your-super-secret-key-2026
      - RESEND_API_KEY=re_xxxxxxxxxxxxxxxx  # 교체 필요
      - FRONTEND_URL=http://localhost:6000
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: saasdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d saasdb"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
